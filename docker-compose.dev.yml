services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: devpassword

  app:
    build:
      context: ./backend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    environment:
      NODE_ENV: development
    command: npm run dev

  nginx:
    profiles:
      - nginx
