name: Main

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('backend/package-lock.json', 'frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Lint backend
        working-directory: backend
        run: npm ci && npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm ci && npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: npm-backend-

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Run unit tests
        working-directory: backend
        # --passWithNoTests: remove once the testing domain adds real unit tests
        run: npm run test -- --passWithNoTests
        env:
          AUTH_BYPASS: 'true'
          # TODO: switch to real Azure AD secrets once McMaster IT provisions the app registration
          # Add AZURE_TENANT_ID and AZURE_CLIENT_ID in repo Settings → Secrets
          AUTH_BYPASS_ROLE: admin

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: worklog_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: npm-backend-

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        run: npm run migrate up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/worklog_test

      - name: Run integration tests
        working-directory: backend
        # passWithNoTests set in test/jest-e2e.json: remove once testing domain adds e2e specs
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/worklog_test
          AUTH_BYPASS: 'true'
          # TODO: switch to real Azure AD secrets once McMaster IT provisions the app registration
          # Add AZURE_TENANT_ID and AZURE_CLIENT_ID in repo Settings → Secrets
          AUTH_BYPASS_ROLE: admin

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('backend/package-lock.json', 'frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Verify OpenAPI spec is up to date
        working-directory: backend
        # Regenerate from the built app and fail if it differs from the committed file,
        # so docs/openapi.yaml can never drift from the actual routes/DTOs.
        run: |
          npm run generate:openapi
          git diff --exit-code -- docs/openapi.yaml

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to staging
        run: |
          echo "TODO - staging deploy not yet configured (post-prototype)"
